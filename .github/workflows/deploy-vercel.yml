name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_TO_EMAIL: ${{ vars.CONTACT_TO_EMAIL }}
          CONTACT_FROM_EMAIL: ${{ vars.CONTACT_FROM_EMAIL }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_TO_EMAIL: ${{ vars.CONTACT_TO_EMAIL }}
          CONTACT_FROM_EMAIL: ${{ vars.CONTACT_FROM_EMAIL }}
        run: |
          url=$(vercel deploy --prebuilt --prod \
            --token="$VERCEL_TOKEN" \
            --env RESEND_API_KEY="$RESEND_API_KEY" \
            --env CONTACT_TO_EMAIL="$CONTACT_TO_EMAIL" \
            --env CONTACT_FROM_EMAIL="$CONTACT_FROM_EMAIL")
          echo "url=$url" >> "$GITHUB_OUTPUT"
